# Sample nginx reverse proxy for tock (TLS termination).
#
# Alternative to the bundled Caddy service for operators who already run nginx
# on the host. It terminates HTTPS and forwards everything to the tock-web
# container's published port (TOCK_HTTP_PORT, default 8080), which serves the
# console and proxies the API to tock-server.
#
# Obtain a certificate first, e.g. with certbot:
#   certbot certonly --nginx -d tock.example.com
# then reload nginx. Replace tock.example.com and the cert paths below.

server {
    listen 80;
    server_name tock.example.com;
    # Redirect all plain HTTP to HTTPS.
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name tock.example.com;

    ssl_certificate     /etc/letsencrypt/live/tock.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tock.example.com/privkey.pem;

    # Everything (console + API) goes to the tock-web container.
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
