# nginx config for the tock web console container.
#
# Serves the built SPA and proxies the API to the tock-server service so the
# whole stack is reachable on a single HTTP entrypoint (no reverse proxy
# required for plain HTTP). The upstream host `tock-server` is the docker
# compose service name — change it if you wire the stack up differently.

upstream tock_server {
    server tock-server:8080;
}

server {
    listen 80;
    server_name _;

    # Never cache the app shell so upgrades take effect immediately.
    location = /index.html {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-cache";
    }

    # API + operational endpoints → tock-server (ciphertext only; this proxy
    # never terminates TLS — put Caddy/nginx/Traefik in front for HTTPS).
    location /v1/ {
        proxy_pass http://tock_server;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /health {
        proxy_pass http://tock_server;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location = /metrics {
        proxy_pass http://tock_server;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # SPA static assets with history-API fallback.
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}
