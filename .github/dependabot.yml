version: 2

updates:
  # Cargo dependencies
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "deps"
    labels:
      - "dependencies"
    open-pull-requests-limit: 10
    groups:
      cargo:
        patterns:
          - "*"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "ci"
    labels:
      - "ci"
      - "dependencies"
    open-pull-requests-limit: 5
    ignore:
      # The dtolnay/rust-toolchain "version" is the project's MSRV pin in the
      # MSRV CI job, not a real action release. Dependabot must not bump it or
      # the MSRV check would test the wrong toolchain.
      - dependency-name: "dtolnay/rust-toolchain"
    groups:
      github-actions:
        patterns:
          - "*"
