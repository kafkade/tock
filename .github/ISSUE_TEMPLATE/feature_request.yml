name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please describe your idea below.

        **Note:** Features that require the server to access plaintext user data
        are incompatible with tock's zero-knowledge architecture and will not be accepted.
  - type: textarea
    id: problem
    attributes:
      label: Is this related to a problem?
      description: A clear description of the problem this would solve
      placeholder: "I'm frustrated when..."
  - type: textarea
    id: solution
    attributes:
      label: Describe the feature
      description: A clear description of what you'd like to happen
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Describe any alternatives you've considered
  - type: dropdown
    id: domain
    attributes:
      label: Which domain does this relate to?
      description: Which productivity domain(s) would this affect?
      options:
        - Task management
        - Habit tracking
        - Time tracking
        - Focus timer (Pomodoro)
        - Cross-domain integration
        - Sync / server
        - CLI / TUI interface
        - iOS / iPad / macOS / watchOS app
        - Web app
        - Encryption / crypto
        - Import / export
        - Query language / filtering
        - Configuration & settings
        - Documentation
        - Not sure
  - type: dropdown
    id: phase
    attributes:
      label: Which roadmap phase does this relate to?
      description: See docs/architecture.md for phase details
      options:
        - "Phase 0: Foundation (core, crypto, storage)"
        - "Phase 1: CLI Task Manager (MVP)"
        - "Phase 2: Habits & Time Tracking"
        - "Phase 3: Focus Timer & Cross-Domain"
        - "Phase 4: Sync & Apple Apps"
        - "Phase 5: Web Client & Advanced Features"
        - "Phase 6: Polish & Ecosystem"
        - "Not sure"
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any other information, mockups, or screenshots
