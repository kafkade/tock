name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish_crates:
        description: "Publish to crates.io"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95.0"
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross (for cross-compilation)
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build release binary
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} -p tock-cli
          else
            cargo build --release --target ${{ matrix.target }} -p tock-cli
          fi
        shell: bash

      # ── macOS code signing + notarization ──────────────────────────────────
      # Signs the CLI binary with the Developer ID Application certificate
      # (hardened runtime + secure timestamp) and notarizes it via notarytool.
      # A bare Mach-O binary cannot be stapled, so we submit a zip of the
      # signed binary; notarization registers the binary's cdhash with Apple,
      # and Gatekeeper validates it online on first launch — no warning.
      #
      # Gated on the signing secrets being present so the workflow degrades
      # gracefully (loud warning, unsigned artifact) until the Apple Developer
      # ID cert + secrets are provisioned. See docs/distribution/README.md.
      - name: Sign and notarize macOS binary
        if: runner.os == 'macOS'
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_DEVELOPER_ID_APPLICATION_P12: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_P12 }}
          APPLE_DEVELOPER_ID_APPLICATION_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_PASSWORD }}
          APPLE_NOTARY_USER: ${{ secrets.APPLE_NOTARY_USER }}
          APPLE_NOTARY_TEAM_ID: ${{ secrets.APPLE_NOTARY_TEAM_ID }}
          APPLE_NOTARY_PASSWORD: ${{ secrets.APPLE_NOTARY_PASSWORD }}
          BIN_PATH: target/${{ matrix.target }}/release/tock
        run: |
          set -euo pipefail

          if [ -z "${APPLE_TEAM_ID:-}" ] || [ -z "${APPLE_DEVELOPER_ID_APPLICATION_P12:-}" ]; then
            echo "::warning title=macOS signing skipped::Apple signing secrets not configured — shipping an UNSIGNED, un-notarized macOS binary. Provision the Developer ID cert + secrets (see docs/distribution/README.md) to enable."
            exit 0
          fi

          KEYCHAIN="$RUNNER_TEMP/tock-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 24)"
          CERT_PATH="$RUNNER_TEMP/developer-id-application.p12"
          NOTARIZE_ZIP="$RUNNER_TEMP/tock-notarize.zip"

          cleanup() {
            security delete-keychain "$KEYCHAIN" 2>/dev/null || true
            rm -f "$CERT_PATH" "$NOTARIZE_ZIP"
          }
          trap cleanup EXIT

          echo "── Creating temporary keychain ──"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"

          echo "── Importing Developer ID Application certificate ──"
          echo "$APPLE_DEVELOPER_ID_APPLICATION_P12" | base64 --decode > "$CERT_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN" \
            -P "$APPLE_DEVELOPER_ID_APPLICATION_PASSWORD" \
            -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN" >/dev/null
          # Put the temp keychain first in the search list so codesign finds the identity.
          security list-keychains -d user -s "$KEYCHAIN" \
            $(security list-keychains -d user | sed s/\"//g)

          SIGN_IDENTITY="Developer ID Application"
          echo "── Code signing (hardened runtime + timestamp) ──"
          codesign --force --options runtime --timestamp \
            --keychain "$KEYCHAIN" \
            --sign "$SIGN_IDENTITY" \
            "$BIN_PATH"
          codesign --verify --strict --verbose=2 "$BIN_PATH"

          echo "── Notarizing ──"
          ditto -c -k "$BIN_PATH" "$NOTARIZE_ZIP"
          xcrun notarytool submit "$NOTARIZE_ZIP" \
            --apple-id "$APPLE_NOTARY_USER" \
            --team-id "$APPLE_NOTARY_TEAM_ID" \
            --password "$APPLE_NOTARY_PASSWORD" \
            --wait
          echo "✅ Signed and notarized $BIN_PATH"
        shell: bash

      - name: Package binary (unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../tock-${{ github.ref_name }}-${{ matrix.target }}.tar.gz tock
          cd ../../..
          sha256sum tock-${{ github.ref_name }}-${{ matrix.target }}.tar.gz > tock-${{ github.ref_name }}-${{ matrix.target }}.tar.gz.sha256

      - name: Package binary (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "target/${{ matrix.target }}/release/tock.exe" -DestinationPath "tock-${{ github.ref_name }}-${{ matrix.target }}.zip"
          $hash = (Get-FileHash "tock-${{ github.ref_name }}-${{ matrix.target }}.zip" -Algorithm SHA256).Hash.ToLower()
          "$hash  tock-${{ github.ref_name }}-${{ matrix.target }}.zip" | Out-File -Encoding ascii "tock-${{ github.ref_name }}-${{ matrix.target }}.zip.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: tock-${{ matrix.target }}
          path: |
            tock-*.tar.gz
            tock-*.zip
            tock-*.sha256

  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Verify version matches tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match Cargo.toml version ($CARGO_VERSION)"
            exit 1
          fi
          echo "✅ Tag $TAG_VERSION matches Cargo.toml"

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Extract release notes from CHANGELOG.md
        id: extract
        uses: ffurrer2/extract-release-notes@v3

      - name: Determine pre-release status
        id: prerelease
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          MAJOR="${VERSION%%.*}"
          if [ "$MAJOR" = "0" ]; then
            echo "flag=--prerelease" >> "$GITHUB_OUTPUT"
          else
            echo "flag=" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_NOTES: ${{ steps.extract.outputs.release_notes }}
        run: |
          echo "$RELEASE_NOTES" > "$RUNNER_TEMP/release-notes.md"
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes-file "$RUNNER_TEMP/release-notes.md" \
            ${{ steps.prerelease.outputs.flag }} \
            artifacts/*

  # ── Crates.io publishing ───────────────────────────────────────────────────
  # Manual-only via workflow_dispatch.  Publishes crates in dependency order
  # with dry-run validation and crates.io index waits between each.
  # Note: tock-server is AGPL-3.0 and intentionally excluded.
  publish:
    name: Publish to crates.io
    if: github.event_name == 'workflow_dispatch' && inputs.publish_crates
    runs-on: ubuntu-latest
    environment: crates-io
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable

      - name: Verify version matches tag (if on a tag)
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match Cargo.toml version ($CARGO_VERSION)"
            exit 1
          fi

      - name: Publish crates (dependency order)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          publish_crate() {
            local crate="$1"
            echo "── Dry-run: $crate ──"
            cargo publish -p "$crate" --dry-run

            echo "── Publishing: $crate ──"
            cargo publish -p "$crate"

            echo "── Waiting for crates.io to index $crate... ──"
            EXPECTED_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
            for i in $(seq 1 30); do
              if cargo search "$crate" 2>/dev/null | grep -q "$crate = \"$EXPECTED_VERSION\""; then
                echo "$crate $EXPECTED_VERSION is indexed."
                return 0
              fi
              echo "Attempt $i/30 — not yet indexed, waiting 10s..."
              sleep 10
            done
            echo "::warning::$crate may not be fully indexed yet, proceeding..."
          }

          # Publish order follows the dependency graph (leaves first).
          # tock-server is AGPL-3.0 — excluded from crates.io publishing.
          publish_crate tock-crypto
          publish_crate tock-core
          publish_crate tock-parse
          publish_crate tock-storage
          publish_crate tock-sync
          publish_crate tock-import
          publish_crate tock-export
          publish_crate tock-cli
