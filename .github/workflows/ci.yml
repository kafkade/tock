name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace --all-features

  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --all-features

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-features --all-targets -- -D warnings

  fmt:
    name: Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  wasm:
    name: WASM build (smoke test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - run: cargo build -p tock-core --target wasm32-unknown-unknown --no-default-features --features core

  # --- Future: iOS build ---
  # ios:
  #   name: iOS build (smoke test)
  #   runs-on: macos-latest
  #   steps:
  #     - uses: actions/checkout@v4
  #     - uses: dtolnay/rust-toolchain@stable
  #       with:
  #         targets: aarch64-apple-ios,aarch64-apple-ios-sim
  #     - uses: Swatinem/rust-cache@v2
  #     - name: Build UniFFI bindings
  #       run: cargo build -p tock-uniffi --target aarch64-apple-ios
  #     - name: Build iOS app
  #       run: |
  #         cd apps/ios
  #         xcodebuild build -scheme Tock -destination 'generic/platform=iOS Simulator' -skipMacroValidation

  # --- Future: Web app build ---
  # web:
  #   name: Web build
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: actions/checkout@v4
  #     - uses: dtolnay/rust-toolchain@stable
  #       with:
  #         targets: wasm32-unknown-unknown
  #     - name: Install wasm-pack
  #       run: cargo install wasm-pack
  #     - name: Build WASM package
  #       run: wasm-pack build crates/tock-core --target web --features core
  #     - name: Install web dependencies
  #       run: cd apps/web && npm ci
  #     - name: Build web app
  #       run: cd apps/web && npm run build

  # Summary gate — single required status check for branch protection / auto-merge
  ci:
    name: CI
    if: always()
    needs: [check, test, clippy, fmt, wasm]
    # When iOS/web jobs are enabled, add them: needs: [check, test, clippy, fmt, wasm, ios, web]
    runs-on: ubuntu-latest
    steps:
      - name: Fail if any dependency failed
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1
      - name: All checks passed
        run: echo "All CI checks passed"
