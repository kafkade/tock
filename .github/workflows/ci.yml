name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings
  # Pin the toolchain explicitly in env so every job (including ones that
  # don't read rust-toolchain.toml via dtolnay/rust-toolchain) stays in
  # lockstep with the repo pin.
  RUST_TOOLCHAIN: "1.85.0"

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace --all-features

  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --all-features

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-features --all-targets -- -D warnings

  fmt:
    name: Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rustfmt
      - run: cargo fmt --all -- --check

  wasm:
    name: WASM build (smoke test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - run: cargo build -p tock-core --target wasm32-unknown-unknown --no-default-features --features core

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          arguments: --all-features

  dist-plan:
    name: cargo-dist plan (validate config)
    runs-on: ubuntu-latest
    # Linux-only; cargo-dist is platform-independent for the plan step.
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - name: Install cargo-dist
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-dist@0.22.1
      - name: Validate dist-workspace.toml
        run: cargo dist plan

  # Non-gating job (deliberately omitted from the `ci` aggregator's needs
  # for now). Once it has proven stable, add it to `ci.needs` and update
  # branch protection in kafkade/github-infra:repo_tock.tf accordingly.
  coverage:
    name: Code coverage (Linux)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      - name: Generate coverage (codecov format)
        run: cargo llvm-cov --workspace --all-features --codecov --output-path codecov.json
      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: codecov.json
          token: ${{ secrets.CODECOV_TOKEN }}
          # Forks (no token) must not fail this gate; the job itself is
          # already `continue-on-error: true`.
          fail_ci_if_error: false

  # --- Future: iOS build ---
  # ios:
  #   name: iOS build (smoke test)
  #   runs-on: macos-latest
  #   steps:
  #     - uses: actions/checkout@v6
  #     - uses: dtolnay/rust-toolchain@master
  #       with:
  #         toolchain: ${{ env.RUST_TOOLCHAIN }}
  #         targets: aarch64-apple-ios,aarch64-apple-ios-sim
  #     - uses: Swatinem/rust-cache@v2
  #     - name: Build UniFFI bindings
  #       run: cargo build -p tock-uniffi --target aarch64-apple-ios
  #     - name: Build iOS app
  #       run: |
  #         cd apps/ios
  #         xcodebuild build -scheme Tock -destination 'generic/platform=iOS Simulator' -skipMacroValidation

  # --- Future: Web app build ---
  # web:
  #   name: Web build
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: actions/checkout@v6
  #     - uses: dtolnay/rust-toolchain@master
  #       with:
  #         toolchain: ${{ env.RUST_TOOLCHAIN }}
  #         targets: wasm32-unknown-unknown
  #     - name: Install wasm-pack
  #       run: cargo install wasm-pack
  #     - name: Build WASM package
  #       run: wasm-pack build crates/tock-core --target web --features core
  #     - name: Install web dependencies
  #       run: cd apps/web && npm ci
  #     - name: Build web app
  #       run: cd apps/web && npm run build

  # Summary gate — single required status check for branch protection / auto-merge.
  # `coverage` is intentionally not in `needs` yet (see job comment).
  ci:
    name: CI
    if: always()
    needs: [check, test, clippy, fmt, wasm, deny, dist-plan]
    runs-on: ubuntu-latest
    steps:
      - name: Fail if any dependency failed
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1
      - name: All checks passed
        run: echo "All CI checks passed"
