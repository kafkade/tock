name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings
  # Pin the toolchain explicitly in env so every job (including ones that
  # don't read rust-toolchain.toml via dtolnay/rust-toolchain) stays in
  # lockstep with the repo pin.
  RUST_TOOLCHAIN: "1.95.0"

jobs:
  # ── Change detection ─────────────────────────────────────────────────────────
  # Determines which component groups were modified so downstream jobs can skip
  # irrelevant work on PRs.  Push-to-main always runs everything.
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      ci: ${{ steps.filter.outputs.ci }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            rust:
              - 'crates/**'
              - 'Cargo.*'
              - 'deny.toml'
              - 'dist-workspace.toml'
              - 'xtask/**'
            ci:
              - '.github/workflows/**'
              - 'rust-toolchain.toml'
              - '.cargo/**'
              - 'scripts/**'
            docs:
              - '**/*.md'
              - '.markdownlint-cli2.jsonc'

  # ── Rust checks ──────────────────────────────────────────────────────────────

  check:
    name: Check
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.rust == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace --all-features

  test:
    name: Test
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.rust == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --all-features

  clippy:
    name: Clippy
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.rust == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-features --all-targets -- -D warnings

  fmt:
    name: Formatting
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.rust == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rustfmt
      - run: cargo fmt --all -- --check

  wasm:
    name: WASM build + size gate
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.rust == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          key: wasm

      - name: Build tock-core for WASM
        run: cargo build -p tock-core --target wasm32-unknown-unknown --no-default-features --features core --release

      # Enforce 2 MB compressed budget (per architecture doc / ADR-005)
      - name: Check bundle size
        run: |
          WASM_FILE=$(find target/wasm32-unknown-unknown/release/deps -name 'tock_core-*.wasm' -not -name '*.d' | head -1)
          if [ -z "$WASM_FILE" ]; then
            echo "::error::Could not find compiled WASM file"
            exit 1
          fi
          RAW_SIZE=$(stat -c%s "$WASM_FILE")
          gzip -k "$WASM_FILE"
          GZ_SIZE=$(stat -c%s "${WASM_FILE}.gz")
          BUDGET=2097152  # 2 MB

          echo "Raw WASM size:        $(( RAW_SIZE / 1024 )) KB ($RAW_SIZE bytes)"
          echo "Compressed WASM size: $(( GZ_SIZE / 1024 )) KB ($GZ_SIZE bytes)"
          echo "Budget:               $(( BUDGET / 1024 )) KB ($BUDGET bytes)"

          if [ "$GZ_SIZE" -gt "$BUDGET" ]; then
            echo "::error::WASM bundle exceeds 2 MB compressed budget ($GZ_SIZE bytes > $BUDGET bytes)"
            exit 1
          fi
          echo "✅ Bundle is within budget"

  msrv:
    name: MSRV (1.95)
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.rust == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.95
      - uses: Swatinem/rust-cache@v2
        with:
          key: msrv
      - run: cargo check --workspace --all-features

  deny:
    name: cargo-deny
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.rust == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          arguments: --all-features

  dist-plan:
    name: cargo-dist plan (validate config)
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.rust == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    # Linux-only; cargo-dist is platform-independent for the plan step.
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - name: Install cargo-dist
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-dist@0.22.1
      - name: Validate dist-workspace.toml
        run: cargo dist plan

  # ── Documentation ────────────────────────────────────────────────────────────

  markdownlint:
    name: Markdown lint
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.docs == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: npx markdownlint-cli2 "**/*.md"

  # ── Non-gating jobs ──────────────────────────────────────────────────────────

  # Non-gating job (deliberately omitted from the `ci` aggregator's needs
  # for now). Once it has proven stable, add it to `ci.needs` and update
  # branch protection in kafkade/github-infra:repo_tock.tf accordingly.
  coverage:
    name: Code coverage (Linux)
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.rust == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      - name: Generate coverage (codecov format)
        run: cargo llvm-cov --workspace --all-features --codecov --output-path codecov.json
      - name: Upload to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: codecov.json
          token: ${{ secrets.CODECOV_TOKEN }}
          # Forks (no token) must not fail this gate; the job itself is
          # already `continue-on-error: true`.
          fail_ci_if_error: false

  # --- Future: iOS build ---
  # ios:
  #   name: iOS build (smoke test)
  #   needs: changes
  #   if: github.event_name == 'push' || needs.changes.outputs.rust == 'true'
  #   runs-on: macos-latest
  #   steps:
  #     - uses: actions/checkout@v6
  #     - uses: dtolnay/rust-toolchain@master
  #       with:
  #         toolchain: ${{ env.RUST_TOOLCHAIN }}
  #         targets: aarch64-apple-ios,aarch64-apple-ios-sim
  #     - uses: Swatinem/rust-cache@v2
  #     - name: Build UniFFI bindings
  #       run: cargo build -p tock-uniffi --target aarch64-apple-ios
  #     - name: Build iOS app
  #       run: |
  #         cd apps/ios
  #         xcodebuild build -scheme Tock -destination 'generic/platform=iOS Simulator' -skipMacroValidation

  # --- Future: Web app build ---
  # web:
  #   name: Web build
  #   needs: changes
  #   if: github.event_name == 'push' || needs.changes.outputs.rust == 'true'
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: actions/checkout@v6
  #     - uses: dtolnay/rust-toolchain@master
  #       with:
  #         toolchain: ${{ env.RUST_TOOLCHAIN }}
  #         targets: wasm32-unknown-unknown
  #     - name: Install wasm-pack
  #       run: cargo install wasm-pack
  #     - name: Build WASM package
  #       run: wasm-pack build crates/tock-core --target web --features core
  #     - name: Install web dependencies
  #       run: cd apps/web && npm ci
  #     - name: Build web app
  #       run: cd apps/web && npm run build

  # ── Summary gate ─────────────────────────────────────────────────────────────
  # Single required status check for branch protection / auto-merge.
  # Downstream jobs may be skipped (path filters) — that is OK; only failures
  # or cancellations block.  `coverage` is intentionally not in `needs` yet.
  ci:
    name: CI
    if: always()
    needs: [changes, check, test, clippy, fmt, wasm, msrv, deny, dist-plan, markdownlint]
    runs-on: ubuntu-latest
    steps:
      - name: Fail if any dependency failed
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1
      - name: All checks passed
        run: echo "All CI checks passed"
