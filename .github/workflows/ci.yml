name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings
  # Pin the toolchain explicitly in env so every job (including ones that
  # don't read rust-toolchain.toml via dtolnay/rust-toolchain) stays in
  # lockstep with the repo pin.
  RUST_TOOLCHAIN: "1.95.0"

jobs:
  # ── Change detection ─────────────────────────────────────────────────────────
  # Determines which component groups were modified so downstream jobs can skip
  # irrelevant work on PRs.  Push-to-main always runs everything.
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      ci: ${{ steps.filter.outputs.ci }}
      docs: ${{ steps.filter.outputs.docs }}
      web: ${{ steps.filter.outputs.web }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            rust:
              - 'crates/**'
              - 'bindings/**'
              - 'Cargo.*'
              - 'deny.toml'
              - 'dist-workspace.toml'
              - 'xtask/**'
            ci:
              - '.github/workflows/**'
              - 'rust-toolchain.toml'
              - '.cargo/**'
              - 'scripts/**'
            docs:
              - '**/*.md'
              - '.markdownlint-cli2.jsonc'
            web:
              - 'apps/web/**'
              - 'crates/tock-wasm/**'
              - 'crates/tock-account/**'

  # ── Rust checks ──────────────────────────────────────────────────────────────

  check:
    name: Check
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.rust == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace --all-features
      - name: Validate localization catalogs
        run: cargo xtask i18n-check

  test:
    name: Test
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.rust == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --all-features

  clippy:
    name: Clippy
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.rust == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-features --all-targets -- -D warnings

  fmt:
    name: Formatting
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.rust == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rustfmt
      - run: cargo fmt --all -- --check

  wasm:
    name: WASM build
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.rust == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          key: wasm
      # Smoke test: verify tock-core compiles to WASM.
      # Size gate (2 MB budget) will be added when tock-core gains cdylib
      # support and wasm-bindgen bindings.
      - run: cargo build -p tock-core --target wasm32-unknown-unknown --no-default-features --features core

  msrv:
    name: MSRV (1.95)
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.rust == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.95
      - uses: Swatinem/rust-cache@v2
        with:
          key: msrv
      - run: cargo check --workspace --all-features

  deny:
    name: cargo-deny
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.rust == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          arguments: --all-features

  dist-plan:
    name: cargo-dist plan (validate config)
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.rust == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    # Linux-only; cargo-dist is platform-independent for the plan step.
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - name: Install cargo-dist
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-dist@0.22.1
      - name: Validate dist-workspace.toml
        run: cargo dist plan

  # ── Documentation ────────────────────────────────────────────────────────────

  markdownlint:
    name: Markdown lint
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.docs == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: npx markdownlint-cli2 "**/*.md"

  # ── Non-gating jobs ──────────────────────────────────────────────────────────

  # Non-gating job (deliberately omitted from the `ci` aggregator's needs
  # for now). Once it has proven stable, add it to `ci.needs` and update
  # branch protection in kafkade/github-infra:repo_tock.tf accordingly.
  coverage:
    name: Code coverage (Linux)
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.rust == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      - name: Generate coverage (codecov format)
        run: cargo llvm-cov --workspace --all-features --codecov --output-path codecov.json
      - name: Upload to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: codecov.json
          token: ${{ secrets.CODECOV_TOKEN }}
          # Forks (no token) must not fail this gate; the job itself is
          # already `continue-on-error: true`.
          fail_ci_if_error: false

  # ── Apple bindings (UniFFI Swift) ────────────────────────────────────────────
  # Builds the TockFFI XCFramework via `cargo xtask xcframework` and runs the
  # TockSwift integration tests against the real Rust core (macOS slice).
  apple:
    name: Apple bindings (Swift)
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.rust == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: aarch64-apple-ios,aarch64-apple-ios-sim,aarch64-apple-darwin,x86_64-apple-darwin
      - uses: Swatinem/rust-cache@v2
      - name: Generate bindings + build XCFramework
        run: cargo xtask xcframework
      - name: Run TockSwift tests
        run: swift test
        working-directory: bindings/swift

  # --- Future: iOS app build ---
  # ios:
  #   name: iOS build (smoke test)
  #   needs: changes
  #   if: github.event_name == 'push' || needs.changes.outputs.rust == 'true'
  #   runs-on: macos-latest
  #   steps:
  #     - uses: actions/checkout@v7
  #     - uses: dtolnay/rust-toolchain@master
  #       with:
  #         toolchain: ${{ env.RUST_TOOLCHAIN }}
  #         targets: aarch64-apple-ios,aarch64-apple-ios-sim
  #     - uses: Swatinem/rust-cache@v2
  #     - name: Build UniFFI bindings
  #       run: cargo build -p tock-uniffi --target aarch64-apple-ios
  #     - name: Build iOS app
  #       run: |
  #         cd apps/ios
  #         xcodebuild build -scheme Tock -destination 'generic/platform=iOS Simulator' -skipMacroValidation

  # --- Web app build + tests ---
  web:
    name: Web build
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.web == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          key: web-wasm
      - name: Install wasm-pack
        run: cargo install wasm-pack --locked
      - name: Build WASM package
        run: wasm-pack build crates/tock-wasm --target web --release
      - name: Check WASM size budget (2 MB gzip)
        run: |
          gz=$(gzip -c crates/tock-wasm/pkg/tock_wasm_bg.wasm | wc -c)
          echo "gzip size: ${gz} bytes"
          test "${gz}" -lt 2097152
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - name: Install web dependencies
        run: cd apps/web && npm install
      - name: Build web app
        run: cd apps/web && npm run build
      - name: Test web app
        run: cd apps/web && npm test

  # ── Summary gate ─────────────────────────────────────────────────────────────
  # Single required status check for branch protection / auto-merge.
  # Downstream jobs may be skipped (path filters) — that is OK; only failures
  # or cancellations block.  `coverage` is intentionally not in `needs` yet.
  ci:
    name: CI
    if: always()
    needs: [changes, check, test, clippy, fmt, wasm, msrv, deny, dist-plan, markdownlint, apple, web]
    runs-on: ubuntu-latest
    steps:
      - name: Fail if any dependency failed
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1
      - name: All checks passed
        run: echo "All CI checks passed"
