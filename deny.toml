# cargo-deny configuration for tock.
#
# Run locally:    cargo deny check
# In CI:          .github/workflows/ci.yml `deny` job.
#
# Architecture reference: docs/architecture.md §4.4 (build targets + CI/CD).

[graph]
# Check every target by default; keep the matrix small so CI stays fast.
targets = [
    { triple = "x86_64-unknown-linux-gnu" },
    { triple = "aarch64-unknown-linux-gnu" },
    { triple = "x86_64-apple-darwin" },
    { triple = "aarch64-apple-darwin" },
    { triple = "x86_64-pc-windows-msvc" },
    { triple = "wasm32-unknown-unknown" },
]
all-features = false
no-default-features = false

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
ignore = [
    # paste crate is unmaintained but has no security vulnerabilities and
    # is a transitive dependency of ratatui/crossterm. No safe upgrade available.
    "RUSTSEC-2024-0436",
    # proc-macro-error2 is unmaintained but has no security vulnerabilities. It
    # is a build-time-only transitive dependency of i18n-embed-fl (the Fluent
    # `fl!`/`tr!` macro). No safe upgrade available until i18n-embed-fl migrates.
    "RUSTSEC-2026-0173",
    # lopdf stack overflow on deeply-nested PDF *input* (parsing). Pulled in
    # transitively by `printpdf` solely to *generate* the Emergency Kit PDF —
    # tock never parses untrusted (or any) PDFs, so the parser path is
    # unreachable. The fix lands in lopdf >= 0.42, which only newer printpdf
    # majors use — and those drag a much larger (azul/allsorts) tree that still
    # pins lopdf < 0.42, so a bump resolves nothing. Revisit when printpdf
    # ships a maintained, slim tree on lopdf >= 0.42.
    "RUSTSEC-2026-0187",
    # ttf-parser is unmaintained (no known vulnerability). It is a transitive,
    # build-and-generate-only dependency of `printpdf` (via owned_ttf_parser),
    # used to embed builtin-font metrics when *writing* the Emergency Kit PDF.
    # tock never parses untrusted font/PDF input. No slim maintained printpdf
    # tree avoids it today (0.9 still depends on ttf-parser).
    "RUSTSEC-2026-0192",
]

[licenses]
# SPDX identifiers. Keep this list tight; new licenses require an explicit
# decision recorded in CHANGELOG.
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "CC0-1.0",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "MPL-2.0",
    "Zlib",
    # CDLA-Permissive-2.0 covers the Mozilla root-certificate data in
    # `webpki-roots`, pulled in transitively by `reqwest` (rustls TLS) for
    # the CLI's HTTP sync transport. It is a permissive data license.
    "CDLA-Permissive-2.0",
    # AGPL-3.0-only applies to tock-server itself. The license MUST be
    # the explicit SPDX identifier (cargo-deny ≥ 0.19 rejects the bare
    # `AGPL-3.0` form for GNU-family licenses).
    "AGPL-3.0-only",
]
confidence-threshold = 0.9
exceptions = []

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
allow = []
deny = [
    # Discourage adding accidental I/O / async runtime deps inside pure crates.
    # (Hard enforcement lives in the future `xtask check-purity` job.)
]
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
